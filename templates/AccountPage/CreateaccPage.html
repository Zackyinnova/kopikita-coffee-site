<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="container-login">
    <div class="content-login">
        <div class="logo-shop">
            <img src="{{ url_for('static', filename='img/logo v2.png') }}" alt="">
        </div>

        <div class="form-login">
            <form action="/CreateAccount" method="POST">
                <div class="header-login">
                    <h3>Sign up</h3>
                    <p>Create a new account to continue</p>
                </div>

                {% if error %}
                    <p class="error-message">{{ error }}</p>
                {% endif %}


                <div class="main-login">
                    <input type="input" placeholder="email" name="input_email">
                    <input type="input" placeholder="Username" name="input_username">
                    <input type="password" placeholder="password" name="input_password">
                    <button type="submit">Sign up</button>
                </div>
            </form>
        </div>

        <div class="signup-text">
            <P>Already have an account?  
                <span> 
                    <a href="{{ url_for('signinpage') }}">
                        Sign in
                    </a>
                </span>
            
            </P>
        </div>
    </div>
</body>
</html>
